<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; }
      .container { min-height: 100vh; display: grid; place-items: center; }
      .card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,.08); text-align: center; width: min(92vw, 420px); }
      .avatar { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; object-position: center; border: 4px solid #e7ecf5; }
      .hint { color: #666; font-size: 14px; margin-top: 12px; }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <img class="avatar" src="assets/profile-photo.svg" alt="Profile photo" />
        <h1>My Portfolio</h1>
        <p class="hint">Profile image is set to <code>assets/profile-photo.svg</code>.</p>
      </section>
    </main>
  </body>
</html>
